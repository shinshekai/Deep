# ─────────────────────────────────────────────────────────────
# UDIP Production Readiness Validation Pipeline
# Runs on: every commit, every PR, nightly schedule
# ─────────────────────────────────────────────────────────────

name: Production Readiness

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/production-readiness.yml'
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC — full suite with coverage
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full suite including coverage'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Static Validation (runs on every commit) ─────────
  static-validation:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Run validation pipeline (fast mode)
        working-directory: backend
        run: |
          python -m app.validation.runner --fast --json --ci \
            --output ../validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-static
          path: validation-report.json

      - name: Generate markdown summary
        if: always()
        working-directory: backend
        run: |
          python -m app.validation.runner --fast \
            --output ../validation-summary.md
          cat ../validation-summary.md >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Backend Tests + Coverage ─────────────────────────
  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        working-directory: backend
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=json \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=60 \
            -v --tb=short \
            2>&1 | tee test-output.txt

      - name: Check coverage threshold
        working-directory: backend
        run: |
          python -c "
          import json, sys
          data = json.load(open('coverage.json'))
          pct = data['totals']['percent_covered']
          print(f'Coverage: {pct:.1f}%')
          if pct < 80:
              print(f'::warning::Backend coverage {pct:.1f}% is below 80% target')
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/coverage.json
            backend/htmlcov/

  # ── Job 3: Frontend Lint + Type Check ───────────────────────
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build check
        working-directory: frontend
        run: npm run build

  # ── Job 4: Full Validation (nightly / manual) ──────────────
  full-validation:
    name: Full Production Readiness
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.full_suite == 'true'
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend/

      - name: Run full validation pipeline
        working-directory: backend
        run: |
          python -m app.validation.runner --json --ci \
            --output ../full-validation-report.json

      - name: Generate weekly report
        if: always()
        working-directory: backend
        run: |
          python -m app.validation.runner \
            --output ../weekly-report.md
          cat ../weekly-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-report
          path: |
            full-validation-report.json
            weekly-report.md

  # ── Job 5: Remediation Progress Gate ────────────────────────
  remediation-gate:
    name: Remediation Progress
    runs-on: ubuntu-latest
    needs: [static-validation]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Check remediation progress
        working-directory: backend
        run: |
          python -c "
          from app.validation.baselines import ValidationReport
          from app.validation.remediation_tracker import validate_remediation, REMEDIATION_ITEMS
          from datetime import datetime, timezone

          report = ValidationReport(timestamp=datetime.now(timezone.utc).isoformat())
          validate_remediation(report)

          done = sum(1 for r in report.results if r.passed and r.check_id != 'REM-SUMMARY')
          total = len(REMEDIATION_ITEMS)
          pct = done / total * 100 if total else 0

          print(f'## Remediation Progress: {done}/{total} ({pct:.0f}%)')
          print()

          for r in report.results:
              if r.check_id == 'REM-SUMMARY':
                  continue
              icon = '✅' if r.passed else '⬜'
              print(f'{icon} {r.message}')

          # Warn if Sprint 1 items are incomplete
          s1_incomplete = [
              r for r in report.results
              if r.check_id.startswith('REM-S1') and not r.passed
          ]
          if s1_incomplete:
              print()
              print('::warning::Sprint 1 critical fixes are incomplete!')
          " >> $GITHUB_STEP_SUMMARY
