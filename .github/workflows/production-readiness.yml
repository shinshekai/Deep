# ─────────────────────────────────────────────────────────────
# UDIP Production Readiness Validation Pipeline
# Runs on: every commit, every PR, nightly schedule
# ─────────────────────────────────────────────────────────────

name: Production Readiness

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/production-readiness.yml'
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly at 02:00 UTC — full suite with coverage
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full suite including coverage'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Static Validation (runs on every commit) ─────────
  static-validation:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Run validation pipeline (fast mode)
        working-directory: backend
        run: |
          python -m app.validation.runner --fast --json --ci \
            --output ../validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-static
          path: validation-report.json

      - name: Generate markdown summary
        if: always()
        working-directory: backend
        run: |
          python -m app.validation.runner --fast \
            --output ../validation-summary.md
          cat ../validation-summary.md >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Backend Tests + Coverage ─────────────────────────
  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev,type-check]"
          pip install pytest-cov

      - name: Type check (mypy)
        working-directory: backend
        run: |
          mypy app --config-file pyproject.toml 2>&1 | tee mypy-output.txt

      - name: Run tests with coverage
        working-directory: backend
        env:
          UDIP_RATE_LIMIT: "10000/minute"
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=json \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=80 \
            -v --tb=short \
            2>&1 | tee test-output.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/coverage.json
            backend/htmlcov/

  # ── Job 3: Frontend Lint + Type Check ───────────────────────
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build check
        working-directory: frontend
        run: npm run build

  # ── Job 4: Security Scanning ────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend + audit tools
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Python dependency audit (pip-audit)
        working-directory: backend
        run: |
          pip-audit --desc --output pip-audit-report.json --format json --strict
          pip-audit --desc

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Node.js dependency audit (npm audit)
        working-directory: frontend
        run: |
          npm audit --audit-level=high
          echo "npm audit completed"

  # ── Job 5: Full Validation (nightly / manual) ──────────────
  full-validation:
    name: Full Production Readiness
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.full_suite == 'true'
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend/

      - name: Run full validation pipeline
        working-directory: backend
        run: |
          python -m app.validation.runner --json --ci \
            --output ../full-validation-report.json

      - name: Generate weekly report
        if: always()
        working-directory: backend
        run: |
          python -m app.validation.runner \
            --output ../weekly-report.md
          cat ../weekly-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-report
          path: |
            full-validation-report.json
            weekly-report.md

  # ── Job 6: Docker Image Build ──────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build --pull -t udip-backend:${{ github.sha }} -f backend/Dockerfile backend/
          docker tag udip-backend:${{ github.sha }} udip-backend:latest

      - name: Build frontend image
        run: |
          docker build --pull -t udip-frontend:${{ github.sha }} -f frontend/Dockerfile frontend/
          docker tag udip-frontend:${{ github.sha }} udip-frontend:latest

      - name: Save Docker images
        run: |
          docker save udip-backend:${{ github.sha }} udip-backend:latest | gzip > udip-backend.tar.gz
          docker save udip-frontend:${{ github.sha }} udip-frontend:latest | gzip > udip-frontend.tar.gz

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            udip-backend.tar.gz
            udip-frontend.tar.gz
          retention-days: 7

      - name: Trivy vulnerability scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: udip-backend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Trivy vulnerability scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: udip-frontend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Log in to container registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.event_name == 'push'
        run: |
          docker tag udip-backend:${{ github.sha }} ghcr.io/${{ github.repository }}/udip-backend:${{ github.sha }}
          docker tag udip-backend:${{ github.sha }} ghcr.io/${{ github.repository }}/udip-backend:latest
          docker push ghcr.io/${{ github.repository }}/udip-backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/udip-backend:latest

      - name: Push frontend image to GHCR
        if: github.event_name == 'push'
        run: |
          docker tag udip-frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/udip-frontend:${{ github.sha }}
          docker tag udip-frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/udip-frontend:latest
          docker push ghcr.io/${{ github.repository }}/udip-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/udip-frontend:latest

  # ── Job 7: Load Testing (nightly / manual) ─────────────────
  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.full_suite == 'true'
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Locust
        run: pip install locust

      - name: Start backend container
        run: |
          docker compose -f docker-compose.prod.yml up -d backend
          sleep 10

      - name: Run load test
        run: |
          locust -f tests/load/locustfile.py \
            --headless \
            -u 50 \
            -r 10 \
            --run-time 2m \
            --host http://localhost:8000 \
            --html load-test-report.html \
            --csv load-test-results
        env:
          LOCUST_USERS: "50"
          LOCUST_SPAWN_RATE: "10"

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            load-test-report.html
            load-test-results_*.csv

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.prod.yml down

  # ── Job 8: Remediation Progress Gate ────────────────────────
  remediation-gate:
    name: Remediation Progress
    runs-on: ubuntu-latest
    needs: [static-validation]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Check remediation progress
        working-directory: backend
        run: |
          python -c "
          from app.validation.baselines import ValidationReport
          from app.validation.remediation_tracker import validate_remediation, REMEDIATION_ITEMS
          from datetime import datetime, timezone

          report = ValidationReport(timestamp=datetime.now(timezone.utc).isoformat())
          validate_remediation(report)

          done = sum(1 for r in report.results if r.passed and r.check_id != 'REM-SUMMARY')
          total = len(REMEDIATION_ITEMS)
          pct = done / total * 100 if total else 0

          print(f'## Remediation Progress: {done}/{total} ({pct:.0f}%)')
          print()

          for r in report.results:
              if r.check_id == 'REM-SUMMARY':
                  continue
              icon = '✅' if r.passed else '⬜'
              print(f'{icon} {r.message}')

          # Warn if Sprint 1 items are incomplete
          s1_incomplete = [
              r for r in report.results
              if r.check_id.startswith('REM-S1') and not r.passed
          ]
          if s1_incomplete:
              print()
              print('::warning::Sprint 1 critical fixes are incomplete!')
          " >> $GITHUB_STEP_SUMMARY

  # ── Job 8: SBOM Generation ───────────────────────────────────
  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Generate Python SBOM
        working-directory: backend
        run: |
          cyclonedx-py environment --output-file ../sbom-python.json --format json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Generate npm SBOM
        working-directory: frontend
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file ../sbom-node.json --json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-python.json
            sbom-node.json

  # ── Job 9: Conventional Commits Check ─────────────────────────
  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          # Check if PR title follows conventional commits format
          PR_TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,}"
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title '$PR_TITLE' does not follow Conventional Commits format."
            echo "Expected: <type>(<optional scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi
          echo "PR title follows Conventional Commits format."

  # ── Job 11: Cloud Deploy (tagged releases only) ───────────────
  cloud-deploy:
    name: Cloud Deploy (tagged releases only)
    runs-on: ubuntu-latest
    needs: [docker-build, backend-tests, frontend-checks, security-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v1.')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Load deployment config
        id: config
        run: |
          if [ -z "${{ secrets.DEPLOY_TARGET }}" ]; then
            echo "DEPLOY_TARGET not set; skipping deployment" >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        if: steps.config.outputs.skip != 'true'
        env:
          DEPLOY_TARGET: ${{ secrets.DEPLOY_TARGET }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          echo "Deploying $IMAGE_TAG to $DEPLOY_TARGET"
          # Deployment logic is environment-specific. Operators should
          # replace this block with their actual deploy command:
          #   - kubectl rollout, helm upgrade, docker stack deploy, etc.
          #   - terraform apply, pulumi up, etc.
          #
          # For now, just record the intent:
          echo "url=https://deep.example.com/v$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Record deployment
        if: always()
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ secrets.DEPLOY_TARGET }}" >> $GITHUB_STEP_SUMMARY
