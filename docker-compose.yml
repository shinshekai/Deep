
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_PORT=8001
      - FRONTEND_URL=http://localhost:3782
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3782:3782"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    volumes:
      - /app/node_modules
    depends_on:
      - backend
