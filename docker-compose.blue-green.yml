services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/.bg-state/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blue-backend
      - blue-frontend
      - green-backend
      - green-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bg-network

  blue-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_PORT=8001
      - FRONTEND_URL=http://blue-frontend:3782
      - DEPLOYMENT_COLOR=blue
    volumes:
      - blue-data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/api/v1/system/health/ready').raise_for_status()"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - bg-network

  blue-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://blue-backend:8001/api/v1
      - NEXT_PUBLIC_WS_URL=ws://blue-backend:8001
      - DEPLOYMENT_COLOR=blue
    depends_on:
      blue-backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3782/"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - bg-network

  green-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_PORT=8001
      - FRONTEND_URL=http://green-frontend:3782
      - DEPLOYMENT_COLOR=green
    volumes:
      - green-data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/api/v1/system/health/ready').raise_for_status()"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - bg-network

  green-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://green-backend:8001/api/v1
      - NEXT_PUBLIC_WS_URL=ws://green-backend:8001
      - DEPLOYMENT_COLOR=green
    depends_on:
      green-backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3782/"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - bg-network

volumes:
  blue-data:
  green-data:

networks:
  bg-network:
    driver: bridge
